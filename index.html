<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Monitoramento de Jobs</title>

  <style>
    body {
      background-color: black;
      color: #00ff00;
      font-family: monospace;
      padding: 20px;
    }

    h1 {
           text-align: center;
    }

    .job {
      border: 1px solid #00ff00;
      padding: 10px;
      margin: 10px 0;
    }

    .status-success {
      color: #00ff00;
    }

    .status-running {
      color: yellow;
    }

    .status-failed {
      color: red;
    }
  </style>
</head>

<body>

  <h1>🖥️ MONITORAMENTO DE JOBS</h1>
   <button onclick="atualizarStatus()">Atualizar Jobs</button>

  <input 
  type="text" 
  placeholder="Buscar job..." 
  onkeyup="filtrarJobs(this.value)"
  style="margin: 10px 0; padding: 5px;"
>

<div class="job" onclick="mostrarLog('JOB001')">
    <p>JOB001 - Processamento Diário</p>
    <p>Status: <span class="status-success">SUCCESS</span></p>
  </div>

  <div class="job" onclick="mostrarLog('JOB002')">
    <p>JOB002 - Carga de Dados</p>
    <p>Status: <span class="status-running">RUNNING</span></p>
  </div>

<div class="job" onclick="mostrarLog('JOB003')">
    <p>JOB003 - Backup</p>
    <p>Status: <span class="status-failed">FAILED</span></p>
  </div>

  <div id="log" style="margin-top:20px; border-top:1px solid #00ff00; padding-top:10px;">
  <p>Clique em um job para ver o log...</p>
</div>

  <script>
  function atualizarStatus() {
    const status = ["SUCCESS", "RUNNING", "FAILED"];
    const classes = ["status-success", "status-running", "status-failed"];

    const jobs = document.querySelectorAll(".job span");

    jobs.forEach(job => {
      const random = Math.floor(Math.random() * 3);
      job.textContent = status[random];
      job.className = classes[random];
    });
  }
    function mostrarLog(job) {
  const log = document.getElementById("log");

  const logs = {
    JOB001: "Processamento concluído com sucesso.",
    JOB002: "Job em execução... carregando dados.",
    JOB003: "Erro: falha no backup."
  };

  log.innerHTML = "<p><strong>" + job + ":</strong> " + logs[job] + "</p>";
}
    
    function filtrarJobs(valor) {
  const jobs = document.querySelectorAll(".job");

  jobs.forEach(job => {
    const texto = job.textContent.toLowerCase();

    if (texto.includes(valor.toLowerCase())) {
      job.style.display = "block";
    } else {
      job.style.display = "none";
    }
  });
}
    
</script>

</body>
</html>
